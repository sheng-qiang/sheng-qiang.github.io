[[items]]
title = "学有所承：研究生毕业传承会撷英"
subtitle = "科教图书"
date = "2025/8"
content = """
**Authors**: [卜东波](https://scholar.google.com/citations?user=gKPWTtMAAAAJ)，[王元卓](https://scholar.google.com/citations?user=v1KzwYEAAAAJ)，盛强 等  
**Publisher**: 上海科学技术出版社  

本书是中国科学院计算技术研究所“学有所承”毕业生传承会的文萃。全书共分四篇：第一篇“早已智珠在握”：辑录毕业生在科研选题、提出思路、读文献、建系统、做实验、组会交流、写论文等方面的具体建议，迹近于“术”；第二篇“更悟学术道通”：辑录毕业生们更深层次的思考，包括方法论、心理调适、如何激发“心流”，以及“什么是格局”等思索，迹近于“道”；第三篇“验谈说与后学听”：辑录圆桌对话环节上毕业生与在读同学们的对话，是答疑，是解惑；第四篇“雏凤清于老凤声”：辑录研究生的导师们的所思所想，是欣慰，是期盼。中国工程院院士李国杰研究员、计算所徐志伟研究员和大湾区大学副校长李晓明教授倾情作序，其意拳拳，其盼殷殷。
"""
link = "https://www.sstp.com.cn/hotbook/4166.html"
image = "/books/inherit.png"

[[items]]
title = "Exploring the Role of Visual Content in Fake News Detection"
subtitle = "Academic Book Chapter"
date = "2020/6"
content = """
**Authors**: Juan Cao, Peng Qi, Qiang Sheng, Tianyun Yang, Junbo Guo, Jintao Li  
**Publisher**: Springer  
[Preprint](https://arxiv.org/abs/2003.05096)

Invited by Professor Kai Shu, Suhang Wang, Dongwon Lee, and Huan Liu, we wrote this book chapter for the book Disinformation, Misinformation, and Fake News in Social Media. This chapter presents a comprehensive review of the visual content in fake news, including the basic concepts, effective visual features, representative detection methods and challenging issues of multimedia fake news detection. We hope that this chapter can help readers to understand the role of visual content in fake news detection, and effectively utilize visual content to assist in detecting multimedia fake news.
"""
link = "https://doi.org/10.1007/978-3-030-42699-6_8"
image = "/books/fake-news-book.webp"
