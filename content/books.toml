title = "我要AI当侦探"
subtitle = "科普图书"
date = "2026/3"
content = """
**Authors**: [曹娟](https://www.ict.ac.cn/sourcedb/cn/jssrck/201011/t20101123_3028158.html)，[李瑜](https://scholar.google.com/citations?user=4-1R-bMAAAAJ)，盛强  
**Publisher**: 中国少年儿童新闻出版总社  

本书是由中国工程院院士、中国计算机学会理事长孙凝晖主编、一线科学家团队主笔的“院士讲课本里的百科·一讲就懂的人工智能”系列丛书中的AI安全分册。本书探讨如何更好使用生成式人工智能、生成式人工智能的安全风险以及如何应对这些风险，帮助大家在掌握AI应用技巧的同时，树立正确的科技观，为未来适应智能社会做好准备。
